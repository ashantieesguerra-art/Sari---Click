<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sari Click</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  
    <script src="firebase-config.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .store-card { background: white; padding: 20px; border-radius: 15px; border-top: 5px solid #1a66ff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .total-banner { background: #051853; color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .revenue-num { font-size: 2.5rem; font-weight: bold; color: #00a844; }
    </style>
</head>
<body class="customer-page">
    <nav class="top-nav">
        <button class="back-btn" onclick="location.href='sariclick2.html'">← Logout</button>
        <h1>Owner Dashboard</h1>
    </nav>

    <main class="container" style="flex-direction: column;">
        <section class="total-banner">
            <h2>Combined Revenue (All Stores)</h2>
            <div class="revenue-num" id="global-revenue">₱0.00</div>
            <p>Total Orders Today: <span id="global-orders">0</span></p>
        </section>

        <div class="admin-stats">
            <div class="store-card">
                <h3>🏪 Store 001</h3>
                <p>Aling Nena's Branch</p>
                <hr>
                <p style="margin-top:10px;">Sales: <strong id="s1-rev">₱0.00</strong></p>
                <p>Orders: <span id="s1-orders">0</span></p>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
